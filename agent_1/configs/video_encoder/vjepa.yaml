data:
  resolution: [144, 160]      # (H, W) — must match decoded video shape
  channels: 1                  # 1 = grayscale, 3 = RGB
  num_frames: 16               # frames per clip
  batch_size: 64
  num_workers: 4

patch:
  patch_dim: [2, 16, 16]       # (T, H, W) per patch — also stride
  grid_size: [8, 9, 10]        # (num_frames/patchT, H/patchH, W/patchW)

encoder:
  dim: 192
  num_layers: 12
  num_heads: 3
  head_dim: 64
  intermediate_size: 768
  dim_partitions: [16, 24, 24] # axial RoPE dims for (T, H, W); sums to head_dim

predictor:
  dim: 192
  num_layers: 6
  num_heads: 3
  head_dim: 64
  intermediate_size: 768
  dim_partitions: [16, 24, 24]

mask:
  # Big blocks — predictor extrapolates across wide gaps.
  - mask_area_ratio: 0.4
    mask_ar_range: [0.75, 1.5]
    num_sub_masks: 1
  # Small blocks — predictor fills in scattered holes.
  - mask_area_ratio: 0.10
    mask_ar_range: [0.75, 1.5]
    num_sub_masks: 4

ema:
  start: 0.998                 # m at step 0 — target moves toward encoder fastest here
  end: 1.0                     # m at ema_steps — target frozen
  ipe_scale: 1.0               # stretch schedule beyond training_steps (>1 = slower ramp)

optim:
  encoder_lr: 1.0e-4
  predictor_lr: 1.0e-4
  loss_exp: 1.0                # 1.0 = L1, 2.0 = L2
  use_lr_schedule: true        # cosine to 0 over training_steps

train:
  max_steps: 100000
  precision: bf16-mixed
  compile: false
  log_every_n_steps: 10
  val_check_interval: 2000     # only used when --val-shards is passed
  ckpt_every_n_steps: 2000
